<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>nes Sprite Tool</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-strong: #eef3f8;
        --border: #d8e1ea;
        --text: #344054;
        --accent: #4f8ef7;
        --accent-dark: #2f6ed3;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f7faff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .main {
        max-width: 1180px;
        margin: 24px auto;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
      }
      .panel {
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .tool {
        cursor: pointer;
        background-color: #fff;
        width: 26px;
        height: 26px;
        line-height: 26px;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        display: inline-block;
        margin: 2px;
        font-size: 12px;
        color: #111827;
      }
      .sw {
        width: 24px;
        height: 24px;
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
        margin: 2px;
      }
      .sysPalette {
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .palette {
        width: 100%;
        margin-bottom: 10px;
      }
      .paletteDiv {
        display: inline-block;
        margin-top: 10px;
        margin-right: 10px;
        padding: 10px 12px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .ng-scope {
        margin-right: 2px;
      }
      .file {
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .canvas {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }
      .editor {
        overflow: auto;
        height: 320px;
        margin-bottom: 20px;
        padding: 10px;
        background: #fcfdff;
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .canvasTool {
        display: inline-block;
        width: 100%;
      }
      .tileViewport {
        max-width: 100%;
        max-height: min(70vh, 760px);
        overflow: auto;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fcfdff;
      }
      .btn {
        font-style: normal;
        font-size: 14px;
        color: #fff;
        padding: 10px 14px;
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.2s ease;
      }
      .btn:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }
      .hint {
        margin-top: 8px;
        color: #667085;
        font-size: 13px;
      }
      label {
        font-weight: 600;
        color: #475467;
      }
      input[type="file"] {
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="panel">
        <div class="canvasTool">
          <div>
            <button class="btn" onclick="clearImg('tileScreen')">clear</button>
            <button class="btn" onclick="clearSelectedTile()">clear selected</button>
            <button class="btn" onclick="deselectEditorTile()">取消选中 ROM</button>
            <button class="btn" onclick="exportPng('tileScreen')">export png</button>
            <button class="btn" onclick="toggleSelectedTileFlip('horizontal')">H Flip</button>
            <button class="btn" onclick="toggleSelectedTileFlip('vertical')">V Flip</button>
          </div>
          <div class="hint">点击格子选择后再翻转</div>
          <div class="tileViewport">
            <canvas id="tileScreen" class="canvas"></canvas>
          </div>
        </div>
      </div>

      <div class="palette">
        <div class="paletteDiv">
          <label>tile</label>
          <div
            class="tool"
            onclick="paletteClick(this,'tile','0')"
            style="background-color: rgb(0, 0, 0, 0)"
          >
            0
          </div>
          <div
            class="tool"
            onclick="paletteClick(this,'tile','1')"
            style="background-color: rgb(188, 188, 188)"
          >
            1
          </div>
          <div
            class="tool"
            onclick="paletteClick(this,'tile','2')"
            style="background-color: rgb(124, 124, 124)"
          >
            2
          </div>
          <div
            class="tool"
            onclick="paletteClick(this,'tile','3')"
            style="background-color: rgb(0, 0, 0)"
          >
            3
          </div>
        </div>
        <div class="paletteDiv">
          <label>rom</label>
          <div class="tool" onclick="paletteClick(this,'rom','0')" style="background-color: rgb(0, 0, 0, 0)">0</div>
          <div class="tool" onclick="paletteClick(this,'rom','1')" style="background-color: rgb(188, 188, 188)">1</div>
          <div class="tool" onclick="paletteClick(this,'rom','2')" style="background-color: rgb(124, 124, 124)">2</div>
          <div class="tool" onclick="paletteClick(this,'rom','3')" style="background-color: rgb(0, 0, 0)">3</div>
        </div>
      </div>

      <div class="file">
        <input
          type="checkbox"
          id="showLine"
          name="showLine"
          onchange="onChange()"
        />
        <label for="showLine">tile 显示line</label>
        <label for="nesfile">Upload nes</label>
        <input type="file" id="nesfile" name="nesfile" accept=".nes" onchange="nesFile()" />
        <button class="btn" onclick="exportTiles()">Export tiles</button>
        <button class="btn" onclick="document.getElementById('importTilesFile').click()">Import tiles</button>
        <input type="file" id="importTilesFile" accept=".json" style="display:none" onchange="importTilesFile()" />
      </div>

      <div class="palette ng-scope" id="sysPalette"></div>

      <div class="editor" id="editorDiv">
        <canvas id="editor" class="canvas"></canvas>
      </div>
    </div>

    <script src="index_new.js"></script>
  </body>
</html>
